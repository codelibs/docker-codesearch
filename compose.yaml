services:
  fess01:
    container_name: fess01
    image: ghcr.io/codelibs/fess:15.7.0
    ports:
      - "8080:8080"
    depends_on:
      - search01
    environment:
      - "SEARCH_ENGINE_HTTP_URL=http://search01:9200"
      - "FESS_DICTIONARY_PATH=/usr/share/opensearch/config/dictionary/"
      # Codesearch-specific Fess configuration lives here as -Dfess.config.* opts
      # (fess_config.properties is eliminated; index.filetype is intentionally dropped —
      # Fess 15.7 default applies).
      - "FESS_JAVA_OPTS=\
        -Dfess.config.adaptive.load.control=30 \
        -Dfess.config.index.user.initial_password=admin \
        -Dfess.config.search_engine.type=codesearch \
        -Dfess.config.app.cipher.key=___change__me___ \
        -Dfess.config.query.additional.response.fields=domain,organization,repository,path,repository_url,owner,homepage \
        -Dfess.config.query.additional.api.response.fields=domain,organization,repository,path,repository_url,owner,homepage \
        -Dfess.config.query.additional.search.fields=domain,organization,repository,path \
        -Dfess.config.query.additional.facet.fields=organization,repository,filename \
        -Dfess.config.query.additional.not.analyzed.fields=domain,organization,repository,path,owner,homepage \
        -Dfess.config.query.facet.fields=label,organization,repository,filename,filetype \
        -Dfess.config.query.facet.fields.size=10 \
        -Dfess.config.query.highlight.fragment.size=500"
      # - "FESS_LOG_LEVEL=debug"
    networks:
      - codesearch_net
    volumes:
      - ./data/fess/home/fess:/home/fess
      - ./data/fess/opt/fess:/opt/fess
      - ./data/fess/var/lib/fess:/var/lib/fess
      - ./data/fess/var/log/fess:/var/log/fess
      - ./data/fess/usr/share/fess/app/WEB-INF/plugin:/usr/share/fess/app/WEB-INF/plugin
      - ./data/fess/usr/share/fess/app/WEB-INF/classes/fess_indices/_codesearch:/usr/share/fess/app/WEB-INF/classes/fess_indices/_codesearch
      # Static theme fetched from fess-themes by setup.sh; mounted at Fess app themes dir.
      # TODO(Task 10): verify /usr/share/fess/app/themes is the correct path in the 15.7 container.
      - ./data/fess/themes/codesearch:/usr/share/fess/app/themes/codesearch
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    restart: unless-stopped

  search01:
    container_name: search01
    image: ghcr.io/codelibs/fess-opensearch:3.6.0
    environment:
      - node.name=search01
      - discovery.seed_hosts=search01
      - cluster.initial_cluster_manager_nodes=search01
      - cluster.name=fess-es
      - bootstrap.memory_lock=true
      - node.roles=cluster_manager,data,ingest,ml
      - "OPENSEARCH_JAVA_OPTS=-Xms1g -Xmx1g"
      - "DISABLE_INSTALL_DEMO_CONFIG=true"
      - "DISABLE_SECURITY_PLUGIN=true"
      - "FESS_DICTIONARY_PATH=/usr/share/opensearch/config/dictionary"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65535
        hard: 65535
    volumes:
      - ./data/opensearch/usr/share/opensearch/data:/usr/share/opensearch/data
      - ./data/opensearch/usr/share/opensearch/config/dictionary:/usr/share/opensearch/config/dictionary
    ports:
      - 9200:9200
    networks:
      - codesearch_net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    restart: unless-stopped

networks:
  codesearch_net:
    driver: bridge

