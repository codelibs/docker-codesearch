# ============================================================
# codesearch overrides for fess_config.properties (the DIFF only).
#
# bin/render-fess-config.sh merges this on top of the upstream base
# (pinned via FESS_VERSION in .env). Each key defined here replaces the
# same key in the base; the result is written to
#   data/fess/opt/fess/fess_config.properties
# which is mounted at /opt/fess and shadows the image's /etc/fess copy
# on the classpath. So this file only needs the codesearch-specific delta.
#
# Do NOT put secrets here. Override app.cipher.key /
# index.user.initial_password (and e.g. rag.chat.enabled) in
# conf/fess_config.local.properties (git-ignored). See README.
# ============================================================

# --- crawl / index load ---
adaptive.load.control=30

# Use the codesearch index schema (WEB-INF/.../fess_indices/_codesearch).
search_engine.type=codesearch

# --- codesearch document / query fields ---
query.additional.response.fields=domain,organization,repository,path,repository_url,owner,homepage
query.additional.api.response.fields=domain,organization,repository,path,repository_url,owner,homepage
query.additional.search.fields=domain,organization,repository,path
query.additional.facet.fields=organization,repository,filename
query.additional.not.analyzed.fields=domain,organization,repository,path,owner,homepage

# --- facets shown in the UI ---
query.facet.fields=label,organization,repository,filename,filetype
query.facet.fields.size=10

# --- larger highlight fragments for source code ---
query.highlight.fragment.size=500

# --- source-code aware mimetype -> filetype label map (codesearch) ---
